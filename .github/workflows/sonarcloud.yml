# SonarCloud: add repository secret SONAR_TOKEN.
# -D sonar.organization / sonar.projectKey: required on the aggregator for CI (e.g. PRs that do not yet
#   include root pom.xml properties); keep identical to sonar-project.properties and pom.xml.
# Analysis runs after tests; JaCoCo XML paths are set in the root pom.xml.
#
# If the scan fails with "CI analysis while Automatic Analysis is enabled": in SonarCloud open the project →
# Administration → Analysis Method → disable Automatic Analysis and keep CI-based analysis (this workflow).
name: SonarCloud
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: Build and analyze
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Verify and SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Psonar
          -Dsonar.organization=forge-sql-orm
          -Dsonar.projectKey=forge-sql-orm_atlassian-runtime-bridge
