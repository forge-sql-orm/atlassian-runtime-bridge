# Static analysis and quality gates on the Java reactor (add steps here as needed; filename stays stable).
# Today: Maven verify (tests + JaCoCo), SonarCloud, Qlty coverage. Secrets: SONAR_TOKEN, QLTY_COVERAGE_TOKEN.
#
# Sonar: -D keys must match sonar-project.properties / root pom.xml. If Sonar reports conflict with
# Automatic Analysis: SonarCloud project → Administration → Analysis Method → use CI only.
name: Static analysis
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Default-deny at the workflow level; each job grants exactly what it needs.
permissions: {}

jobs:
  static_analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read           # actions/checkout
      pull-requests: write     # SonarCloud PR decoration / inline comments
      checks: write            # SonarCloud check status posted via GITHUB_TOKEN
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # checkout does not write GITHUB_TOKEN to .git/config

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Maven verify and SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Psonar
          -Dsonar.organization=forge-sql-orm
          -Dsonar.projectKey=forge-sql-orm_atlassian-runtime-bridge

      - name: Upload JaCoCo to Qlty
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        env:
          JACOCO_SOURCE_PATH: atlassian-runtime-bridge-common/src/main/java atlassian-runtime-bridge-forge/src/main/java
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          format: jacoco
          skip-missing-files: true
          files: |
            atlassian-runtime-bridge-common/target/site/jacoco/jacoco.xml
            atlassian-runtime-bridge-forge/target/site/jacoco/jacoco.xml
