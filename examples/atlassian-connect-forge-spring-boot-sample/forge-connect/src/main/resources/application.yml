spring.jpa.hibernate.ddl-auto: update
# File-backed HSQL for the Connect add-on lifecycle / host tables
spring.datasource.url: jdbc:hsqldb:file:addon-db

addon:
  key: runtime-bridge-spring-boot-sample-atlaskit
  # Public URL of this Spring app (ngrok, etc.) — must match Forge remote baseUrl
  base-url: http://vzakharchenko.ngrok.dev

logging.level.com.atlassian.connect.spring: TRACE
