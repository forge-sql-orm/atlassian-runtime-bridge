# Local egress proxy sidecar only — Spring runs on the host (mvn spring-boot:run).
# cp .env.example .env, set APP_ID / ENV_ID / ENV_NAME, then ./dev-loop.sh
# Or: mvn spring-boot:run (terminal 1) + docker compose up (terminal 2).

services:
#  java-service:
